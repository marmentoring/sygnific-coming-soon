<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Sygnific — Executive advisory for those building what comes next. Launching soon.">
  <title>SYGNIFIC — Launching Soon</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --gold: #C9A227;
      --navy: #0B1628;
      --white: #F5F3EE;
      --speed: 1000ms;
    }

    html, body {
      width: 100%;
      height: 100%;
      background: var(--navy);
      font-family: 'Montserrat', sans-serif;
    }

    /* ── PAGE SHELL: full-height flex column ────────────── */
    .page {
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: stretch;
    }

    /* ── HEADER ─────────────────────────────────────────── */
    header {
      flex: 0 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 24px 48px;
      background: var(--navy);
      border-bottom: 1px solid rgba(201,162,39,0.15);
    }

    .logo-lockup {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .logo-lockup img {
      height: 44px;
      width: auto;
    }

    .logo-divider {
      width: 1px;
      height: 30px;
      background: rgba(201,162,39,0.4);
    }

    .logo-meta {
      font-size: 9px;
      font-weight: 400;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: rgba(245,243,238,0.55);
      line-height: 1.8;
    }

    .logo-meta strong {
      display: block;
      font-weight: 500;
      color: var(--gold);
      font-size: 10px;
      letter-spacing: 0.45em;
    }

    .slide-counter {
      font-family: 'Cormorant Garamond', serif;
      font-size: 14px;
      font-weight: 300;
      color: rgba(245,243,238,0.45);
      letter-spacing: 0.15em;
    }

    .slide-counter em {
      font-style: normal;
      color: var(--gold);
      font-size: 18px;
    }

    /* ── CAROUSEL AREA ──────────────────────────────────── */
    .carousel-area {
      flex: 1 1 auto;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 0;
      gap: 0;
    }

    /* The track: sized to image natural ratio ≈ 1521×265 */
    .carousel-track {
      position: relative;
      width: 100%;
      max-width: 1521px;
      aspect-ratio: 1521 / 265;
    }

    .slide {
      position: absolute;
      inset: 0;
      opacity: 0;
      transition: opacity var(--speed) ease;
      pointer-events: none;
    }

    .slide.active {
      opacity: 1;
      pointer-events: auto;
    }

    .slide img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    /* ── DOTS ───────────────────────────────────────────── */
    .dots {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-top: 28px;
    }

    .dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: rgba(245,243,238,0.25);
      border: none;
      cursor: pointer;
      transition: all 350ms ease;
      padding: 0;
    }

    .dot.active {
      width: 30px;
      border-radius: 4px;
      background: var(--gold);
    }

    .dot:hover:not(.active) {
      background: rgba(245,243,238,0.55);
    }

    /* ── PROGRESS BAR ───────────────────────────────────── */
    .progress-wrap {
      width: 100%;
      max-width: 1521px;
      height: 2px;
      background: rgba(245,243,238,0.08);
      margin-top: 14px;
    }

    .progress-fill {
      height: 100%;
      width: 0%;
      background: var(--gold);
      transition: width 80ms linear;
    }

    /* ── FOOTER ─────────────────────────────────────────── */
    footer {
      flex: 0 0 auto;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px 48px;
      border-top: 1px solid rgba(201,162,39,0.12);
      background: var(--navy);
    }

    .contact-link {
      display: flex;
      align-items: center;
      gap: 9px;
      color: rgba(245,243,238,0.5);
      text-decoration: none;
      font-size: 11px;
      font-weight: 300;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      transition: color 250ms ease;
    }

    .contact-link:hover { color: var(--gold); }

    .contact-link svg {
      width: 15px;
      height: 15px;
      flex-shrink: 0;
    }

    /* ── MOBILE ─────────────────────────────────────────── */
    @media (max-width: 680px) {
      header {
        padding: 16px 20px;
      }

      .logo-lockup img { height: 34px; }
      .logo-divider, .logo-meta { display: none; }

      .carousel-area {
        padding: 24px 0;
        gap: 0;
        /* On mobile: stack all 3 images, no carousel */
        justify-content: flex-start;
      }

      /* Override carousel to stack vertically */
      .carousel-track {
        position: static;
        aspect-ratio: auto;
        height: auto;
      }

      .slide {
        position: static;
        opacity: 1 !important;
        pointer-events: auto;
        display: block;
      }

      .slide + .slide {
        margin-top: 3px;
      }

      .slide img {
        height: auto;
      }

      .dots, .progress-wrap { display: none; }

      footer { padding: 16px 20px; }
    }

    /* ── FADE IN ────────────────────────────────────────── */
    header, footer, .carousel-area {
      animation: fadeIn 800ms ease both;
    }
    footer { animation-delay: 200ms; }
    .carousel-area { animation-delay: 100ms; }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

<div class="page">

  <!-- Header -->
  <header>
    <div class="logo-lockup">
      <img src="logo/logo-sg.png" alt="Sygnific">
      <div class="logo-divider"></div>
      <div class="logo-meta">
        <strong>SYGNIFIC</strong>
        Executive Advisory
      </div>
    </div>
    <div class="slide-counter">
      <em id="cur">01</em> / 03
    </div>
  </header>

  <!-- Carousel -->
  <main class="carousel-area">

    <div class="carousel-track" id="track">
      <div class="slide active">
        <img src="images/slide1.jpg" alt="Something Significant is Taking Shape" loading="eager">
      </div>
      <div class="slide">
        <img src="images/slide2.jpg" alt="We're Building More Than a Website" loading="eager">
      </div>
      <div class="slide">
        <img src="images/slide3.jpg" alt="Great Things Begin Quietly" loading="eager">
      </div>
    </div>

    <div class="progress-wrap">
      <div class="progress-fill" id="progress"></div>
    </div>

    <nav class="dots" aria-label="Slide navigation">
      <button class="dot active" data-i="0" aria-label="Slide 1"></button>
      <button class="dot" data-i="1" aria-label="Slide 2"></button>
      <button class="dot" data-i="2" aria-label="Slide 3"></button>
    </nav>

  </main>

  <!-- Footer -->
  <footer>
    <a href="mailto:info@sygnific.global" class="contact-link">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <rect x="2" y="4" width="20" height="16" rx="2"/>
        <path d="M2 7l10 7 10-7"/>
      </svg>
      info@sygnific.global
    </a>
  </footer>

</div>

<script>
  const slides   = document.querySelectorAll('.slide');
  const dots     = document.querySelectorAll('.dot');
  const progress = document.getElementById('progress');
  const curEl    = document.getElementById('cur');
  const INTERVAL = 6000;

  let current = 0, timer, raf, t0;

  const pad = n => String(n + 1).padStart(2, '0');

  function goTo(idx) {
    slides[current].classList.remove('active');
    dots[current].classList.remove('active');
    current = ((idx % slides.length) + slides.length) % slides.length;
    slides[current].classList.add('active');
    dots[current].classList.add('active');
    curEl.textContent = pad(current);
    resetProgress();
  }

  function resetProgress() {
    cancelAnimationFrame(raf);
    progress.style.width = '0%';
    t0 = performance.now();
    (function tick(now) {
      const pct = Math.min((now - t0) / INTERVAL * 100, 100);
      progress.style.width = pct + '%';
      if (pct < 100) raf = requestAnimationFrame(tick);
    })(t0);
  }

  function resetTimer() {
    clearInterval(timer);
    timer = setInterval(() => goTo(current + 1), INTERVAL);
  }

  dots.forEach(d => d.addEventListener('click', () => {
    goTo(+d.dataset.i);
    resetTimer();
  }));

  document.addEventListener('keydown', e => {
    if (e.key === 'ArrowRight') { goTo(current + 1); resetTimer(); }
    if (e.key === 'ArrowLeft')  { goTo(current - 1); resetTimer(); }
  });

  let tx = 0;
  document.addEventListener('touchstart', e => tx = e.changedTouches[0].screenX, { passive: true });
  document.addEventListener('touchend', e => {
    const dx = tx - e.changedTouches[0].screenX;
    if (Math.abs(dx) > 40) { goTo(current + (dx > 0 ? 1 : -1)); resetTimer(); }
  }, { passive: true });

  resetProgress();
  resetTimer();
</script>

</body>
</html>
