<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Sygnific — Executive advisory for those building what comes next. Launching soon.">
  <title>SYGNIFIC — Launching Soon</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --gold: #C9A227;
      --navy: #0B1628;
      --speed: 1000ms;
    }

    html, body {
      width: 100%;
      min-height: 100%;
      background: var(--navy);
      font-family: 'Montserrat', sans-serif;
    }

    .page {
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: stretch;
    }

    /* ── HEADER ─────────────────────────────────────────── */
    header {
      flex: 0 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 48px;
      background: var(--navy);
      border-bottom: 1px solid rgba(201,162,39,0.18);
    }

    .logo-badge img {
      height: 130px;
      width: auto;
      display: block;
      filter: brightness(0) invert(1);
    }

    .slide-counter {
      font-family: 'Cormorant Garamond', serif;
      font-size: 15px;
      font-weight: 300;
      color: rgba(245,243,238,0.4);
      letter-spacing: 0.15em;
    }

    .slide-counter em {
      font-style: normal;
      color: var(--gold);
      font-size: 20px;
    }

    /* ── COMING SOON BANNER ──────────────────────────────── */
    .coming-soon {
      flex: 0 0 auto;
      text-align: center;
      padding: 36px 24px 28px;
    }

    .coming-soon-label {
      font-family: 'Montserrat', sans-serif;
      font-size: 11px;
      font-weight: 400;
      letter-spacing: 0.55em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 10px;
      display: block;
    }

    .coming-soon h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(48px, 8vw, 96px);
      font-weight: 300;
      letter-spacing: 0.12em;
      color: #F5F3EE;
      line-height: 1;
      text-transform: uppercase;
    }

    .coming-soon h1 em {
      font-style: italic;
      color: var(--gold);
      font-weight: 300;
    }

    .coming-soon-rule {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 16px;
      margin-top: 16px;
    }

    .coming-soon-rule::before,
    .coming-soon-rule::after {
      content: '';
      height: 1px;
      width: 80px;
      background: linear-gradient(to right, transparent, rgba(201,162,39,0.5));
    }

    .coming-soon-rule::after {
      background: linear-gradient(to left, transparent, rgba(201,162,39,0.5));
    }

    .coming-soon-rule span {
      font-size: 9px;
      letter-spacing: 0.4em;
      text-transform: uppercase;
      color: rgba(201,162,39,0.6);
    }

    /* ── CAROUSEL AREA ──────────────────────────────────── */
    .carousel-area {
      flex: 1 1 auto;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px 0 36px;
    }

    /* Fixed-ratio track matching the image proportions */
    .carousel-track {
      position: relative;
      width: 100%;
      max-width: 1521px;
      /* Use contain so each image shows fully without cropping */
      background: var(--navy);
      /* Aspect ratio of the tallest image: 1521×274 */
      aspect-ratio: 1521 / 274;
    }

    .slide {
      position: absolute;
      inset: 0;
      opacity: 0;
      transition: opacity var(--speed) ease;
      pointer-events: none;
    }

    .slide.active {
      opacity: 1;
      pointer-events: auto;
    }

    .slide img {
      width: 100%;
      height: 100%;
      /* contain keeps all 3 images fully visible without any cropping */
      object-fit: contain;
      display: block;
    }

    /* ── PROGRESS + DOTS ─────────────────────────────────── */
    .carousel-controls {
      width: 100%;
      max-width: 1521px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      margin-top: 16px;
    }

    .progress-wrap {
      width: 100%;
      height: 2px;
      background: rgba(245,243,238,0.07);
    }

    .progress-fill {
      height: 100%;
      width: 0%;
      background: var(--gold);
    }

    .dots {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: rgba(245,243,238,0.22);
      border: none;
      cursor: pointer;
      transition: all 350ms ease;
      padding: 0;
    }

    .dot.active {
      width: 30px;
      border-radius: 4px;
      background: var(--gold);
    }

    .dot:hover:not(.active) {
      background: rgba(245,243,238,0.5);
    }

    /* ── FOOTER ─────────────────────────────────────────── */
    footer {
      flex: 0 0 auto;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 18px 48px;
      border-top: 1px solid rgba(201,162,39,0.12);
      background: var(--navy);
    }

    .contact-link {
      display: flex;
      align-items: center;
      gap: 9px;
      color: rgba(245,243,238,0.45);
      text-decoration: none;
      font-size: 11px;
      font-weight: 300;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      transition: color 250ms ease;
    }

    .contact-link:hover { color: var(--gold); }

    .contact-link svg {
      width: 14px;
      height: 14px;
      flex-shrink: 0;
    }

    /* ── MOBILE ──────────────────────────────────────────── */
    @media (max-width: 680px) {
      header { padding: 14px 20px; }

      .logo-badge img { height: 100px; }
      .slide-counter { display: none; }
      header { justify-content: center; }

      .coming-soon { padding: 24px 20px 16px; }

      /* Stack all 3 images vertically on mobile */
      .carousel-track {
        position: static;
        aspect-ratio: auto;
        background: transparent;
      }

      .slide {
        position: static;
        opacity: 1 !important;
        pointer-events: auto;
        display: block;
      }

      .slide + .slide { margin-top: 4px; }

      .slide img { object-fit: contain; height: auto; }

      .carousel-controls { display: none; }

      footer { padding: 14px 20px; }
    }

    /* ── FADE IN ─────────────────────────────────────────── */
    header  { animation: fadeDown 700ms ease both; }
    .coming-soon { animation: fadeDown 700ms 120ms ease both; }
    .carousel-area { animation: fadeDown 700ms 220ms ease both; }
    footer  { animation: fadeDown 700ms 320ms ease both; }

    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

<div class="page">

  <!-- Header -->
  <header>
    <div class="logo-badge">
      <img src="logo/logo-sg.png" alt="Sygnific">
    </div>
    <div class="slide-counter">
      <em id="cur">01</em> / 03
    </div>
  </header>

  <!-- Coming Soon Title -->
  <section class="coming-soon">
    <span class="coming-soon-label">sygnific.global</span>
    <h1>Coming <em>Soon</em></h1>
    <div class="coming-soon-rule">
      <span>Executive Advisory</span>
    </div>
  </section>

  <!-- Carousel -->
  <main class="carousel-area">

    <div class="carousel-track">
      <div class="slide active">
        <img src="images/slide1.jpg" alt="Something Significant is Taking Shape" loading="eager">
      </div>
      <div class="slide">
        <img src="images/slide2.jpg" alt="We're Building More Than a Website" loading="eager">
      </div>
      <div class="slide">
        <img src="images/slide3.jpg" alt="Great Things Begin Quietly" loading="eager">
      </div>
    </div>

    <div class="carousel-controls">
      <div class="progress-wrap">
        <div class="progress-fill" id="progress"></div>
      </div>
      <nav class="dots" aria-label="Slide navigation">
        <button class="dot active" data-i="0" aria-label="Slide 1"></button>
        <button class="dot" data-i="1" aria-label="Slide 2"></button>
        <button class="dot" data-i="2" aria-label="Slide 3"></button>
      </nav>
    </div>

  </main>

  <!-- Footer -->
  <footer>
    <a href="mailto:info@sygnific.global" class="contact-link">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <rect x="2" y="4" width="20" height="16" rx="2"/>
        <path d="M2 7l10 7 10-7"/>
      </svg>
      info@sygnific.global
    </a>
  </footer>

</div>

<script>
  const slides   = document.querySelectorAll('.slide');
  const dots     = document.querySelectorAll('.dot');
  const progress = document.getElementById('progress');
  const curEl    = document.getElementById('cur');
  const INTERVAL = 6000;

  let current = 0, timer, raf, t0;
  const pad = n => String(n + 1).padStart(2, '0');

  function goTo(idx) {
    slides[current].classList.remove('active');
    dots[current].classList.remove('active');
    current = ((idx % slides.length) + slides.length) % slides.length;
    slides[current].classList.add('active');
    dots[current].classList.add('active');
    curEl.textContent = pad(current);
    startProgress();
  }

  function startProgress() {
    cancelAnimationFrame(raf);
    progress.style.width = '0%';
    t0 = performance.now();
    (function tick(now) {
      const pct = Math.min((now - t0) / INTERVAL * 100, 100);
      progress.style.width = pct + '%';
      if (pct < 100) raf = requestAnimationFrame(tick);
    })(t0);
  }

  function resetTimer() {
    clearInterval(timer);
    timer = setInterval(() => goTo(current + 1), INTERVAL);
  }

  dots.forEach(d => d.addEventListener('click', () => {
    goTo(+d.dataset.i); resetTimer();
  }));

  document.addEventListener('keydown', e => {
    if (e.key === 'ArrowRight') { goTo(current + 1); resetTimer(); }
    if (e.key === 'ArrowLeft')  { goTo(current - 1); resetTimer(); }
  });

  let tx = 0;
  document.addEventListener('touchstart', e => tx = e.changedTouches[0].screenX, { passive: true });
  document.addEventListener('touchend', e => {
    const dx = tx - e.changedTouches[0].screenX;
    if (Math.abs(dx) > 40) { goTo(current + (dx > 0 ? 1 : -1)); resetTimer(); }
  }, { passive: true });

  startProgress();
  resetTimer();
</script>

</body>
</html>
