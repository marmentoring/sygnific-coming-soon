<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Sygnific — Executive advisory for those building what comes next. Launching soon.">
  <meta property="og:title" content="Sygnific — Something Significant is Taking Shape">
  <meta property="og:description" content="Executive advisory for those building what comes next.">
  <meta property="og:image" content="images/slide1.jpg">
  <title>SYGNIFIC — Launching Soon</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --gold: #C9A227;
      --navy: #0D1B35;
      --white: #F5F3EE;
      --transition-speed: 1200ms;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: var(--navy);
    }

    /* ─── CAROUSEL WRAPPER ─────────────────────────────── */
    .carousel {
      position: relative;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
    }

    /* ─── SLIDES ────────────────────────────────────────── */
    .slide {
      position: absolute;
      inset: 0;
      opacity: 0;
      transition: opacity var(--transition-speed) cubic-bezier(0.4, 0, 0.2, 1);
      pointer-events: none;
    }

    .slide.active {
      opacity: 1;
      pointer-events: auto;
    }

    .slide img.bg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center center;
      transform: scale(1.06);
      transition: transform 8000ms cubic-bezier(0.25, 0.46, 0.45, 0.94);
      will-change: transform;
    }

    .slide.active img.bg {
      transform: scale(1);
    }

    /* Vignette overlay for depth */
    .slide::after {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse at 70% 50%, transparent 30%, rgba(0,0,0,0.45) 100%),
        linear-gradient(to bottom, rgba(0,0,0,0.25) 0%, transparent 30%, transparent 70%, rgba(0,0,0,0.4) 100%);
      pointer-events: none;
    }

    /* ─── TOP LOGO BAR ──────────────────────────────────── */
    .top-bar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 28px 48px;
      background: linear-gradient(to bottom, rgba(0,0,0,0.5) 0%, transparent 100%);
    }

    .logo-lockup {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .logo-lockup img {
      height: 52px;
      width: auto;
      filter: brightness(0) invert(1);
      opacity: 0.92;
    }

    .logo-divider {
      width: 1px;
      height: 36px;
      background: rgba(201, 162, 39, 0.5);
    }

    .logo-text {
      font-family: 'Montserrat', sans-serif;
      font-weight: 300;
      font-size: 10px;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: rgba(245, 243, 238, 0.7);
      line-height: 1.6;
    }

    .logo-text strong {
      display: block;
      font-weight: 500;
      color: var(--gold);
      font-size: 11px;
      letter-spacing: 0.4em;
    }

    /* ─── BOTTOM BAR ────────────────────────────────────── */
    .bottom-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      z-index: 100;
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      padding: 0 48px 36px;
      background: linear-gradient(to top, rgba(0,0,0,0.45) 0%, transparent 100%);
    }

    /* Email link */
    .contact-link {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
      color: rgba(245, 243, 238, 0.75);
      font-family: 'Montserrat', sans-serif;
      font-size: 12px;
      font-weight: 300;
      letter-spacing: 0.15em;
      transition: color 300ms ease;
    }

    .contact-link:hover {
      color: var(--gold);
    }

    .contact-link svg {
      width: 16px;
      height: 16px;
      opacity: 0.7;
      flex-shrink: 0;
    }

    /* Navigation dots */
    .dots {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: rgba(245, 243, 238, 0.35);
      cursor: pointer;
      transition: all 400ms ease;
      border: none;
      padding: 0;
    }

    .dot.active {
      width: 28px;
      border-radius: 3px;
      background: var(--gold);
    }

    .dot:hover:not(.active) {
      background: rgba(245, 243, 238, 0.65);
    }

    /* Progress bar */
    .progress-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      height: 2px;
      background: var(--gold);
      z-index: 200;
      width: 0%;
      transition: width 100ms linear;
    }

    /* Slide counter */
    .slide-counter {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-size: 13px;
      color: rgba(245, 243, 238, 0.5);
      letter-spacing: 0.2em;
    }

    .slide-counter span {
      color: var(--gold);
      font-size: 16px;
    }

    /* ─── INITIAL FADE IN ────────────────────────────────── */
    .top-bar,
    .bottom-bar {
      animation: fadeDown 1200ms 300ms cubic-bezier(0.4, 0, 0.2, 1) both;
    }

    .bottom-bar {
      animation-name: fadeUp;
    }

    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ─── MOBILE ────────────────────────────────────────── */
    @media (max-width: 640px) {
      .top-bar {
        padding: 20px 24px;
      }

      .logo-lockup img {
        height: 40px;
      }

      .logo-divider {
        display: none;
      }

      .logo-text {
        display: none;
      }

      .bottom-bar {
        padding: 0 24px 28px;
        flex-direction: column-reverse;
        align-items: center;
        gap: 16px;
      }

      .slide img.bg {
        object-position: 30% center;
      }
    }

    /* Touch hint on mobile */
    .touch-hint {
      position: fixed;
      bottom: 80px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 100;
      font-family: 'Montserrat', sans-serif;
      font-size: 10px;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: rgba(245, 243, 238, 0.35);
      display: none;
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.35; }
      50% { opacity: 0.65; }
    }

    @media (max-width: 640px) {
      .touch-hint { display: block; }
    }
  </style>
</head>
<body>

  <!-- Progress bar -->
  <div class="progress-bar" id="progressBar"></div>

  <!-- Top logo bar -->
  <header class="top-bar">
    <div class="logo-lockup">
      <img src="logo/logo-sg.png" alt="Sygnific" id="headerLogo">
      <div class="logo-divider"></div>
      <div class="logo-text">
        <strong>SYGNIFIC</strong>
        Executive Advisory
      </div>
    </div>
    <div class="slide-counter">
      <span id="currentSlide">01</span> / 03
    </div>
  </header>

  <!-- Carousel -->
  <div class="carousel" id="carousel" role="region" aria-label="Sygnific carousel">

    <div class="slide active" role="group" aria-label="Slide 1 of 3">
      <img class="bg" src="images/slide1.jpg" alt="Something Significant is Taking Shape — executive advisory, launching soon" loading="eager">
    </div>

    <div class="slide" role="group" aria-label="Slide 2 of 3">
      <img class="bg" src="images/slide2.jpg" alt="We're Building More Than a Website — executive growth and market expansion" loading="eager">
    </div>

    <div class="slide" role="group" aria-label="Slide 3 of 3">
      <img class="bg" src="images/slide3.jpg" alt="Great Things Begin Quietly — a new executive advisory platform is coming" loading="eager">
    </div>

  </div>

  <!-- Bottom bar -->
  <footer class="bottom-bar">
    <a href="mailto:info@sygnific.global" class="contact-link" aria-label="Email Sygnific">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" aria-hidden="true">
        <rect x="2" y="4" width="20" height="16" rx="2"/>
        <path d="M2 7l10 7 10-7"/>
      </svg>
      info@sygnific.global
    </a>
    <nav class="dots" aria-label="Slide navigation">
      <button class="dot active" aria-label="Go to slide 1" data-index="0"></button>
      <button class="dot" aria-label="Go to slide 2" data-index="1"></button>
      <button class="dot" aria-label="Go to slide 3" data-index="2"></button>
    </nav>
  </footer>

  <div class="touch-hint" aria-hidden="true">Swipe to explore</div>

  <script>
    const slides    = document.querySelectorAll('.slide');
    const dots      = document.querySelectorAll('.dot');
    const progressBar = document.getElementById('progressBar');
    const currentSlideEl = document.getElementById('currentSlide');

    let current = 0;
    let autoplay;
    let progressStart;
    const INTERVAL = 6000; // ms between slides
    let animFrame;

    // Pad number
    const pad = n => String(n + 1).padStart(2, '0');

    function goTo(index) {
      slides[current].classList.remove('active');
      dots[current].classList.remove('active');

      current = (index + slides.length) % slides.length;

      slides[current].classList.add('active');
      dots[current].classList.add('active');
      currentSlideEl.textContent = pad(current);

      // Restart progress bar
      clearProgress();
      startProgress();
    }

    function next() { goTo(current + 1); }

    // Progress bar animation
    function startProgress() {
      progressStart = performance.now();
      function tick(now) {
        const elapsed = now - progressStart;
        const pct = Math.min((elapsed / INTERVAL) * 100, 100);
        progressBar.style.width = pct + '%';
        if (pct < 100) animFrame = requestAnimationFrame(tick);
      }
      animFrame = requestAnimationFrame(tick);
    }

    function clearProgress() {
      cancelAnimationFrame(animFrame);
      progressBar.style.width = '0%';
    }

    function resetAutoplay() {
      clearInterval(autoplay);
      autoplay = setInterval(next, INTERVAL);
    }

    // Dot clicks
    dots.forEach(dot => {
      dot.addEventListener('click', () => {
        goTo(parseInt(dot.dataset.index));
        resetAutoplay();
      });
    });

    // Keyboard navigation
    document.addEventListener('keydown', e => {
      if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
        goTo(current + 1); resetAutoplay();
      } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
        goTo(current - 1); resetAutoplay();
      }
    });

    // Touch / swipe
    let touchStartX = 0;
    let touchStartY = 0;

    document.addEventListener('touchstart', e => {
      touchStartX = e.changedTouches[0].screenX;
      touchStartY = e.changedTouches[0].screenY;
    }, { passive: true });

    document.addEventListener('touchend', e => {
      const dx = touchStartX - e.changedTouches[0].screenX;
      const dy = touchStartY - e.changedTouches[0].screenY;
      if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 40) {
        dx > 0 ? (goTo(current + 1), resetAutoplay()) : (goTo(current - 1), resetAutoplay());
      }
    }, { passive: true });

    // Pause on hover/focus (desktop accessibility)
    const carousel = document.getElementById('carousel');
    carousel.addEventListener('mouseenter', () => {
      clearInterval(autoplay);
      cancelAnimationFrame(animFrame);
    });
    carousel.addEventListener('mouseleave', () => {
      startProgress();
      resetAutoplay();
    });

    // Start
    startProgress();
    autoplay = setInterval(next, INTERVAL);
  </script>

</body>
</html>
